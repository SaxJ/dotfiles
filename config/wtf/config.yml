wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: orange
      normal: gray
  grid:
    columns: [35, 35, 35, 35, 35, 35, 32, 35]
    rows: [10, 10, 10, 10, 10, 10, 10, 4, 3]
  refreshInterval: 1
  mods:
    feedreader:
        enabled: true
        feeds:
            - http://wtfutil.com/blog/index.xml
                # MATH
            - https://blog.computationalcomplexity.org/feeds/posts/default
            - https://rjlipton.wordpress.com/feed
        feedLimit: 20
        position:
            top: 0
            left: 0
            width: 3
            height: 5
        updateInterval: 14400

    git:
        commitCount: 5
        commitFormat: "[forestgreen]%h [grey]%cd [white]%s [grey]%an[white]"
        dateFormat: "%H:%M %d %b %y"
        enabled: true
        position:
            top: 0
            left: 3
            height: 3
            width: 2
        refreshInterval: 8
        repositories:
            - "/home/saxonj/Documents/suz"
            - "/home/saxonj/Documents/unicron"
            - "/home/saxonj/Documents/megatron"
            - "/home/saxonj/Documents/mad-murdock"

    power:
        enabled: true
        position:
            top: 0
            left: 5
            height: 1
            width: 1
        refreshInterval: 15
        title: "⚡️"

    ipinfo:
        colors:
            name: "lightblue"
            value: "white"
        enabled: true
        position:
            top: 0
            left: 6
            height: 1
            width: 1
        refreshInterval: 150

    clocks:
        colors:
        rows:
            even: "lightblue"
            odd: "white"
        enabled: true
        locations:
            Warsaw: "Europe/Warsaw"
            Perth: "Australia/Perth"
        position:
            top: 0
            left: 7
            height: 1
            width: 1
        refreshInterval: 15
        sort: "alphabetical"
        title: "Clocks B"
        type: "clocks"

    hackernews:
        enabled: true
        numberOfStories: 10
        position:
            top: 3
            left: 3
            height: 2
            width: 2
        storyType: top
        refreshInterval: 900

    kubernetes:
        enabled: true
        kubeconfig: "/home/saxonj/.kube/config"
        objects:
            - pods
        position:
            top: 1
            left: 5
            height: 3
            width: 3
        refreshInterval: 300
        title: "Kube"

    spotify:
        enabled: true
        position:
            top: 4
            left: 6
            height: 1
            width: 2
        refreshInterval: 0

    todo:
        checkedIcon: "X"
        colors:
            checked: gray
            highlight:
            fore: "black"
            back: "orange"
        enabled: true
        filename: "todo.yml"
        position:
            top: 5
            left: 5
            height: 2
            width: 2
        refreshInterval: 3600
    
    prettyweather:
        enabled: true
        city: "perth"
        position:
            top: 6
            left: 7
            height: 1
            width: 1
        refreshInterval: 300
        unit: "m"
        view: 0
        language: "en"

    cmdrunner:
        args: ["mine"]
        cmd: "jira"
        enabled: true
        position:
            top: 5
            left: 1
            height: 2
            width: 3
        refreshInterval: 30



