theme = "solarized-dark"
icons = "awesome"

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0

[[block]]
block = "memory"
display_type = "memory"
format_mem = "{Mup}%"
format_swap = "{SUp}%"

[[block]]
block = "cpu"
interval = 1

[[block]]
block = "load"
interval = 1
format = "{1m}"

[[block]]
block = "sound"

[[block]]
block = "time"
interval = 30
format = "%a %d/%m %R"

[[block]]
block = "pacman"
interval = 600
format = "{pacman} pacman | {aur} AUR updates"
format_singular = "{both} update available"
format_up_to_date = "no updates"
critical_updates_regex = "(linux|linux-lts|linux-zen)"
# aur_command should output available updates to stdout (ie behave as echo -ne "update\n")
aur_command = "yay -Qua"

[[block]]
block = "maildir"
interval = 60
inboxes = ["/home/saxonj/.mail/personal/INBOX", "/home/saxonj/.mail/gaming/INBOX", "/home/saxonj/.mail/work/INBOX"]
threshold_warning = 1
threshold_critical = 10
display_type = "new"
